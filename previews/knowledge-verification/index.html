const decisions = {};
const comments = {};

function verdictBadge(v) {
  const map = { likely_current: 'current', likely_stale: 'stale', needs_review: 'review', duplicate: 'duplicate' };
  const label = { likely_current: 'Current', likely_stale: 'Stale', needs_review: 'Review', duplicate: 'Dupe' };
  return '<span class="badge badge-' + (map[v]||'review') + '">' + (label[v]||v) + '</span>';
}

function render() {
  const ft = document.getElementById('filterTable').value;
  const fd = document.getElementById('filterDomain').value;
  const fv = document.getElementById('filterVerdict').value;
  const fdc = document.getElementById('filterDecision').value;
  const search = document.getElementById('searchBox').value.toLowerCase();

  const filtered = DATA.filter((r, i) => {
    if (ft && r.table !== ft) return false;
    if (fd && r.domain !== fd) return false;
    if (fv && r.haiku_verdict !== fv) return false;
    if (search && !r.title.toLowerCase().includes(search) && !r.snippet.toLowerCase().includes(search)) return false;
    if (fdc === 'undecided' && decisions[r.id]) return false;
    if (fdc && fdc !== 'undecided' && decisions[r.id] !== fdc) return false;
    return true;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = filtered.map((r, fi) => {
    const dec = decisions[r.id] || '';
    const cls = dec ? ' decided-' + dec : '';
    return '<tr data-id="' + r.id + '">' +
      '<td>' + (fi+1) + '</td>' +
      '<td><span class="table-tag">' + r.table.replace('knowledge_','ka:').replace('decision_','dl:').replace('nova_','nm:') + '</span></td>' +
      '<td><span class="domain-tag">' + r.domain + '</span></td>' +
      '<td>' + escHtml(r.title) + '<br><span class="snippet">' + escHtml(r.snippet.slice(0,200)) + '</span></td>' +
      '<td>' + r.age_days + 'd</td>' +
      '<td>' + verdictBadge(r.haiku_verdict) + '</td>' +
      '<td style="color:var(--muted);font-size:0.85em;max-width:200px">' + escHtml(r.haiku_reason) + '</td>' +
      '<td><select class="decision-select' + cls + '" onchange="setDecision(\''+r.id+'\',this.value,this)">' +
        '<option value="">—</option>' +
        '<option value="verified"' + (dec==='verified'?' selected':'') + '>Verified</option>' +
        '<option value="stale"' + (dec==='stale'?' selected':'') + '>Stale</option>' +
        '<option value="retire"' + (dec==='retire'?' selected':'') + '>Retire</option>' +
      '</select></td>' +
      '<td><input class="comment-input" value="' + escAttr(comments[r.id]||'') + '" onchange="comments[\''+r.id+'\']=this.value" placeholder="..." /></td>' +
    '</tr>';
  }).join('');

  const decided = Object.values(decisions).filter(v => v).length;
  document.getElementById('progressLabel').textContent = decided + ' / ' + DATA.length + ' decided';
  document.getElementById('statsLabel').textContent = 'Showing ' + filtered.length + ' of ' + DATA.length;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return s.replace(/"/g,'&quot;').replace(/&/g,'&amp;'); }

function setDecision(id, val, el) {
  decisions[id] = val;
  el.className = 'decision-select' + (val ? ' decided-' + val : '');
  const decided = Object.values(decisions).filter(v => v).length;
  document.getElementById('progressLabel').textContent = decided + ' / ' + DATA.length + ' decided';
}

function bulkSet(val) {
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    const id = tr.dataset.id;
    decisions[id] = val;
    const sel = tr.querySelector('.decision-select');
    if (sel) { sel.value = val; sel.className = 'decision-select' + (val ? ' decided-' + val : ''); }
  });
  const decided = Object.values(decisions).filter(v => v).length;
  document.getElementById('progressLabel').textContent = decided + ' / ' + DATA.length + ' decided';
}

function acceptHaiku() {
  document.querySelectorAll('#tableBody tr').forEach(tr => {
    const id = tr.dataset.id;
    const row = DATA.find(r => r.id === id);
    if (!row) return;
    let val = '';
    if (row.haiku_verdict === 'likely_current') val = 'verified';
    else if (row.haiku_verdict === 'likely_stale' || row.haiku_verdict === 'duplicate') val = 'stale';
    if (val) {
      decisions[id] = val;
      const sel = tr.querySelector('.decision-select');
      if (sel) { sel.value = val; sel.className = 'decision-select decided-' + val; }
    }
  });
  const decided = Object.values(decisions).filter(v => v).length;
  document.getElementById('progressLabel').textContent = decided + ' / ' + DATA.length + ' decided';
}

function exportSQL() {
  const lines = [];
  const today = new Date().toISOString().slice(0,10);

  for (const row of DATA) {
    const dec = decisions[row.id];
    if (!dec) continue;

    if (row.table === 'nova_memory') {
      if (dec === 'verified') {
        lines.push("UPDATE nova_memory SET last_confirmed_at = NOW(), review_status = 'reviewed' WHERE id = '" + row.id + "';");
      } else if (dec === 'stale' || dec === 'retire') {
        lines.push("UPDATE nova_memory SET importance = 0, review_status = 'retired' WHERE id = '" + row.id + "';");
      }
    } else {
      if (dec === 'verified') {
        lines.push("UPDATE " + row.table + " SET verification_state = 'verified', last_validated = '" + today + "' WHERE id = '" + row.id + "';");
      } else if (dec === 'stale') {
        lines.push("UPDATE " + row.table + " SET verification_state = 'contested', last_validated = NULL WHERE id = '" + row.id + "';");
      } else if (dec === 'retire') {
        lines.push("UPDATE " + row.table + " SET status = " + (row.table === 'sops' ? "'inactive'" : "'superseded'") + ", verification_state = 'contested' WHERE id = '" + row.id + "';");
      }
    }
  }

  const sql = '-- Knowledge Verification P.7 — ' + today + '\n' +
    '-- ' + lines.length + ' updates from Emil review\n\n' +
    lines.join('\n');

  navigator.clipboard.writeText(sql).then(() => {
    alert('Copied ' + lines.length + ' SQL statements to clipboard!');
  });
}

function exportCSV() {
  let csv = 'table,domain,id,title,age_days,haiku_verdict,haiku_reason,decision,comment\n';
  for (const row of DATA) {
    const dec = decisions[row.id] || '';
    const com = (comments[row.id] || '').replace(/"/g, '""');
    csv += [row.table, row.domain, row.id, '"'+row.title.replace(/"/g,'""')+'"', row.age_days, row.haiku_verdict, '"'+row.haiku_reason.replace(/"/g,'""')+'"', dec, '"'+com+'"'].join(',') + '\n';
  }
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'knowledge-verification-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

document.getElementById('filterTable').addEventListener('change', render);
document.getElementById('filterDomain').addEventListener('change', render);
document.getElementById('filterVerdict').addEventListener('change', render);
document.getElementById('filterDecision').addEventListener('change', render);
document.getElementById('searchBox').addEventListener('input', render);
render();
</script>
