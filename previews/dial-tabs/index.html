<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dial Attempt Tabs — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #13151A; color: #F0F2F5; font-family: 'Inter', system-ui, sans-serif; padding: 40px; }
  h2 { font-size: 14px; color: #5C6370; margin-bottom: 24px; letter-spacing: 0.5px; text-transform: uppercase; }
  .cards { display: flex; flex-direction: column; gap: 16px; max-width: 360px; }
  .card {
    position: relative;
    background: linear-gradient(135deg, rgba(255,193,7,0.07) 0%, #1C1E24 35%);
    border: 1px solid rgba(255,193,7,0.25);
    border-left: 4px solid #FFC107;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .card.grey {
    background: linear-gradient(135deg, rgba(120,144,156,0.07) 0%, #1C1E24 35%);
    border-color: rgba(120,144,156,0.25);
    border-left-color: #78909C;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; }
  .name { font-size: 14px; font-weight: 600; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; margin-right: 8px; }
  .tabs { display: flex; gap: 3px; }
  .tab { width: 5px; height: 14px; border-radius: 2px; }
  .tab.yellow { background: #FFC107; }
  .tab.orange { background: #FB8C00; }
  .tab.red { background: #EF5350; }
  .buttons { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
  }
  .btn-ghl { color: #4CAF50; border-color: rgba(76,175,80,0.3); }
  .btn-sms { color: #2196F3; border-color: rgba(33,150,243,0.3); }
  .btn-dialed { color: #F0F2F5; border-color: rgba(255,255,255,0.12); }
  .btn-dq { color: #EF5350; border-color: rgba(239,83,80,0.3); }
  .subtitle { font-size: 11px; color: #5C6370; margin-top: 4px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-top: 6px; }
  .badge-unconfirmed { background: rgba(255,193,7,0.15); color: #FFC107; }
  .label { font-size: 11px; color: #78909C; margin-bottom: 8px; }
</style>
</head>
<body>

<h2>Dial Attempt Indicators</h2>

<div class="cards">

  <div class="label">Unconfirmed — 1 dial attempt (yellow)</div>
  <div class="card">
    <div class="card-header">
      <div><span class="dot"></span><span class="name">Sarah Mitchell</span></div>
      <div class="tabs"><div class="tab yellow"></div></div>
    </div>
    <span class="badge badge-unconfirmed">⚠ UNCONFIRMED</span>
    <div class="buttons">
      <button class="btn btn-ghl">📞 GHL</button>
      <button class="btn btn-sms">💬 SMS</button>
      <button class="btn btn-dialed">Dialed</button>
      <button class="btn btn-dq">DQ</button>
    </div>
  </div>

  <div class="label" style="margin-top:12px">Unconfirmed — 2 dial attempts (orange)</div>
  <div class="card">
    <div class="card-header">
      <div><span class="dot"></span><span class="name">David Prang</span></div>
      <div class="tabs"><div class="tab orange"></div><div class="tab orange"></div></div>
    </div>
    <span class="badge badge-unconfirmed">⚠ UNCONFIRMED</span>
    <div class="buttons">
      <button class="btn btn-ghl">📞 GHL</button>
      <button class="btn btn-sms">💬 SMS</button>
      <button class="btn btn-dialed">Dialed</button>
      <button class="btn btn-dq">DQ</button>
    </div>
  </div>

  <div class="label" style="margin-top:12px">Called No Answer — 3+ dial attempts (red = DQ prompt)</div>
  <div class="card grey">
    <div class="card-header">
      <div><span class="dot"></span><span class="name">Marcus Johnson</span></div>
      <div class="tabs"><div class="tab red"></div><div class="tab red"></div><div class="tab red"></div></div>
    </div>
    <div class="subtitle">Called, No Answer</div>
    <div class="buttons">
      <button class="btn btn-ghl">📞 GHL</button>
      <button class="btn btn-sms">💬 SMS</button>
      <button class="btn btn-dialed">Dialed</button>
      <button class="btn btn-dq">DQ</button>
    </div>
  </div>

  <div class="label" style="margin-top:12px">No attempts yet — no tabs</div>
  <div class="card">
    <div class="card-header">
      <div><span class="dot"></span><span class="name">Kaila Silverman</span></div>
    </div>
    <span class="badge badge-unconfirmed">⚠ UNCONFIRMED</span>
    <div class="buttons">
      <button class="btn btn-ghl">📞 GHL</button>
      <button class="btn btn-sms">💬 SMS</button>
      <button class="btn btn-dialed">Dialed</button>
      <button class="btn btn-dq">DQ</button>
    </div>
  </div>

</div>
</body>
</html>
