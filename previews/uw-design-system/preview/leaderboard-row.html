<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding:0; }
  .lth { display:grid; grid-template-columns:44px 1fr 100px 90px; gap:16px; padding:10px 22px; font-size:9px; letter-spacing:.22em; color:#888; border-bottom:1px solid #1a1a1a; background:rgba(255,255,255,.015); font-family:'Rajdhani',sans-serif; font-weight:600; text-transform:uppercase; }
  .ltr { display:grid; grid-template-columns:44px 1fr 100px 90px; gap:16px; padding:13px 22px; border-bottom:1px solid #1a1a1a; align-items:center; }
  .ltr:last-child { border-bottom:none; }
  .rk { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:600; color:#888; }
  .rk.one { color:#ff1a8c; text-shadow:0 0 8px rgba(255,26,140,.5); }
  .nm { font-family:'Rajdhani',sans-serif; font-size:13px; color:#f0ede8; font-weight:500; }
  .you { font-size:8px; background:rgba(255,26,140,.1); color:#ff1a8c; padding:2px 7px; letter-spacing:.14em; margin-left:8px; text-transform:uppercase; font-family:'Share Tech Mono',monospace; }
  .mt { font-size:10px; color:#888; margin-top:1px; font-family:'Share Tech Mono',monospace; letter-spacing:.06em; }
  .sc { font-family:'Rajdhani',sans-serif; font-size:15px; font-weight:500; color:#f0ede8; text-align:right; }
  .sc.top { color:#ff1a8c; }
  .sk { font-size:12px; color:#ff1a8c; text-align:right; font-family:'Share Tech Mono',monospace; letter-spacing:.04em; }
  .sk .n { color:#f0ede8; font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:500; margin-left:4px; letter-spacing:0; }
</style>
</head><body>
<div class="card">
  <div class="lth"><span>#</span><span>ID</span><span style="text-align:right">SCORE</span><span style="text-align:right">STREAK</span></div>
  <div class="ltr"><div class="rk one">1</div><div><div class="nm">you<span class="you">01</span></div><div class="mt">HPF · today</div></div><div class="sc top">9,240</div><div class="sk">&gt;&gt;<span class="n">14</span></div></div>
  <div class="ltr"><div class="rk">2</div><div><div class="nm">dan_g</div><div class="mt">HPF · Toronto</div></div><div class="sc">8,120</div><div class="sk">&gt;&gt;<span class="n">9</span></div></div>
  <div class="ltr"><div class="rk">3</div><div><div class="nm">friend_03</div><div class="mt">— add yours</div></div><div class="sc">6,880</div><div class="sk">&gt;&gt;<span class="n">6</span></div></div>
</div>
</body></html>
