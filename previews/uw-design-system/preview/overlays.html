<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 28px; }
  .r { display:flex; gap:14px; align-items:center; padding:6px 0; }
  .sw { width:46px; height:46px; flex-shrink:0; }
  .l { font-family:'Share Tech Mono',monospace; font-size:10px; color:#888; letter-spacing:.08em; }
  .l b { color:#f0ede8; font-weight:400; display:block; margin-bottom:2px; letter-spacing:.1em; text-transform:uppercase; }
</style>
</head><body>
<div class="card">
  <div class="r"><div class="sw" style="background:rgba(255,26,140,.05);border:1px solid #ff1a8c;border-width:0 0 0 2px"></div><div class="l"><b>blockquote fill</b>rgba(255,26,140,.05) — 2px pink left rule</div></div>
  <div class="r"><div class="sw" style="background:rgba(255,26,140,.1)"></div><div class="l"><b>pink chip / "you" tag</b>rgba(255,26,140,.1)</div></div>
  <div class="r"><div class="sw" style="background:rgba(255,255,255,.02)"></div><div class="l"><b>hover row</b>rgba(255,255,255,.02)</div></div>
  <div class="r"><div class="sw" style="background:rgba(0,0,0,.96);backdrop-filter:blur(14px);border:1px solid #1a1a1a"></div><div class="l"><b>scrolled nav</b>rgba(0,0,0,.96) · blur(14px)</div></div>
</div>
</body></html>
