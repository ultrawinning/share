<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 16px 28px; }
  .sub { font-family:'Share Tech Mono',monospace; font-size:10px; color:#666; letter-spacing:.08em; margin:0 0 12px; }
  h4 { font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.2em; text-transform:uppercase; margin:0 0 8px; font-weight:400; }
  h4 .tag { color:#ff1a8c; }
  .bad,.good { font-family:Verdana,Arial,sans-serif; font-size:12px; line-height:1.5; padding:6px 12px; margin-bottom:5px; max-width:440px; color:#ccc; }
  .bad { border-left:2px solid #333; color:#666; text-decoration:line-through; text-decoration-color:#ff1a8c; text-decoration-thickness:1px; }
  .good { border-left:2px solid #ff1a8c; color:#f0ede8; }
  .col { display:flex; gap:22px; }
  .c { flex:1; }
</style>
</head><body>
<div class="card">
  <div class="sub">// side-by-side phrasing rules for any ultrawinning copy</div>
  <div class="col">
    <div class="c">
      <h4>// <span class="tag">don't</span> write</h4>
      <div class="bad">In today's fast-paced world…</div>
      <div class="bad">leverage · unlock · seamless · delve</div>
      <div class="bad">Here's the thing:</div>
    </div>
    <div class="c">
      <h4>// <span class="tag">do</span> write</h4>
      <div class="good">I got here the same way a lot of people did.</div>
      <div class="good">That is upside down.</div>
      <div class="good">This is the moat.</div>
    </div>
  </div>
</div>
</body></html>
