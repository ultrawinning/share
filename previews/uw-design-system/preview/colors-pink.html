<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; }
  .hero { display:flex; align-items:stretch; gap:0; height:140px; }
  .big { flex: 1.4; background:#ff1a8c; display:flex; align-items:flex-end; padding:14px; color:#000; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; }
  .swatches { flex: 1; display:flex; flex-direction:column; }
  .sw { flex:1; display:flex; align-items:center; padding: 0 14px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.08em; }
  .sw .label { width:72px; color:#888; text-transform:uppercase; }
  .sw .val { color:#ccc; opacity:.7; }
  .chip { width:28px; height:28px; margin-right:10px; }
  .caption { margin-top:12px; font-family:'Share Tech Mono',monospace; font-size:10px; color:#888; letter-spacing:.1em; }
</style>
</head><body>
<div class="card">
  <div class="hero">
    <div class="big">#ff1a8c · pink · the only accent</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#ff1a8c"></div><span class="label">solid</span><span class="val">#ff1a8c</span></div>
      <div class="sw"><div class="chip" style="background:rgba(255,26,140,0.1);outline:1px solid #222"></div><span class="label">dim 10%</span><span class="val">rgba(255,26,140,.1)</span></div>
      <div class="sw"><div class="chip" style="background:rgba(255,26,140,0.05);outline:1px solid #222"></div><span class="label">overlay 5%</span><span class="val">rgba(255,26,140,.05)</span></div>
      <div class="sw"><div class="chip" style="background:rgba(255,10,138,0.09);outline:1px solid #222"></div><span class="label">ghost 9%</span><span class="val">rgba(255,10,138,.09)</span></div>
    </div>
  </div>
  <div class="caption">// pink is the ONLY accent — never a background fill, never a gradient</div>
</div>
</body></html>
