<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>IG Post Template — Ultrawinning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
   * IG POST TEMPLATE — 1080 × 1080
   * Edit the CONTENT block at the bottom of this file.
   * Wrap any word(s) you want in PINK with <em>...</em>.
   * Body paragraph is optional — delete the .body line if not needed.
   * ============================================================ */

  html,body{margin:0;padding:0;background:#111;height:100%;width:100%;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  .stage{width:1080px;height:1080px;transform-origin:center center}
  .frame{
    width:1080px;height:1080px;
    background:#000;color:#ccc;
    position:relative;overflow:hidden;
    font-family:'Rajdhani',sans-serif;
  }
  .frame::before{
    content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 5px,rgba(255,255,255,.012) 5px,rgba(255,255,255,.012) 6px);
  }
  .frame::after{
    content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 75% 60% at 15% 100%,rgba(255,26,140,.45) 0%,rgba(255,26,140,.12) 30%,transparent 65%),
      radial-gradient(ellipse 100% 55% at 50% 110%,rgba(255,26,140,.22) 0%,transparent 70%);
  }

  .ghost{
    position:absolute;top:60px;left:0;right:0;z-index:0;
    font-family:'Rajdhani',sans-serif;font-weight:500;
    font-size:110px;line-height:.9;
    color:rgba(255,255,255,.06);
    letter-spacing:.18em;text-transform:uppercase;
    text-align:center;white-space:nowrap;
    pointer-events:none;user-select:none;
  }
  .ghost .cur{color:rgba(255,26,140,.18)}

  .content{
    position:absolute;left:90px;right:90px;top:50%;
    transform:translateY(-50%);
    z-index:1;
  }
  .eyebrow{
    font-family:'Share Tech Mono',monospace;
    font-size:22px;color:#ff1a8c;
    letter-spacing:.22em;text-transform:uppercase;
    margin-bottom:22px;
  }
  .title{
    font-family:'Rajdhani',sans-serif;font-weight:600;
    font-size:82px;line-height:1.02;
    color:#f0ede8;letter-spacing:-.005em;
    margin:0 0 28px;text-wrap:balance;
  }
  .title em{color:#ff1a8c;font-style:normal}
  .rule{width:110px;height:2px;background:#ff1a8c;margin-bottom:40px}
  .body{
    font-family:Verdana,Arial,sans-serif;
    font-size:30px;line-height:1.55;color:#ccc;
    max-width:860px;
  }
  .body em{color:#ff1a8c;font-style:normal}

  .foot{
    position:absolute;bottom:75px;left:90px;right:90px;
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:22px;color:#888;text-transform:uppercase;
    z-index:1;
  }
  .foot .url{font-family:'Rajdhani',sans-serif;font-weight:500;letter-spacing:.15em;color:#f0ede8}
  .foot .page{font-family:'Share Tech Mono',monospace;letter-spacing:-.01em;color:#666}
  .cur{color:#ff1a8c;animation:blink 1s step-end infinite;display:inline-block;margin-left:2px}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</head><body>
<div class="stage" id="stage">
  <div class="frame">

    <!-- GHOST WORDMARK · don't edit -->
    <div class="ghost">ULTRAWINNING<span class="cur">_</span></div>

    <div class="content">

      <!-- EYEBROW · short tag in pink mono. Examples:
           // new essay   // note   // shipped   // reading list -->
      <div class="eyebrow">// new essay</div>

      <!-- TITLE · the hook. Use <em> for pink emphasis. -->
      <h1 class="title">Replace this with <em>your title</em>.</h1>

      <div class="rule"></div>

      <!-- BODY · 1–2 sentences in Verdana. Delete this whole div if you don't need a body.
           Use <em> for pink emphasis on a key phrase. -->
      <div class="body">Optional supporting line. Keep it tight — <em>one idea</em>, no filler.</div>

    </div>

    <!-- FOOTER · url + page counter (use 01/01 if single, 01/06 etc for sequences). -->
    <div class="foot">
      <span class="url">ultrawinning.com<span class="cur">_</span></span>
      <span class="page">01 / 01</span>
    </div>

  </div>
</div>
<script>
  const fit = () => {
    const stage = document.getElementById('stage');
    const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1080);
    stage.style.transform = `scale(${s})`;
  };
  window.addEventListener('resize', fit); fit();
</script>
</body></html>
