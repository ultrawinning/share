<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Pull-quote — Ultrawinning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0a0a0a;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;box-sizing:border-box}
  .frame{width:1200px;height:675px;background:#000;color:#ccc;position:relative;overflow:hidden;transform-origin:center}
  .frame::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(255,255,255,.01) 4px,rgba(255,255,255,.01) 5px);pointer-events:none}
  .frame::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 75% 60% at 15% 100%,rgba(255,26,140,.45) 0%,rgba(255,26,140,.12) 30%,transparent 65%),radial-gradient(ellipse 100% 55% at 50% 110%,rgba(255,26,140,.22) 0%,transparent 70%);pointer-events:none}
  .ghost{position:absolute;top:-24px;right:-20px;font-family:'Rajdhani',sans-serif;font-weight:500;font-size:170px;line-height:.9;color:rgba(255,255,255,.05);letter-spacing:.18em;text-transform:uppercase;white-space:nowrap;pointer-events:none}
  .ghost span{color:rgba(255,10,138,.08)}
  .content{position:relative;z-index:1;padding:70px 90px;height:100%;box-sizing:border-box;display:flex;flex-direction:column}
  .eyebrow{font-family:'Share Tech Mono',monospace;font-size:14px;color:#ff1a8c;letter-spacing:.22em;text-transform:uppercase}
  .rule{width:80px;height:2px;background:#ff1a8c;margin:18px 0 34px}
  .quote{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:68px;line-height:1.08;color:#f0ede8;letter-spacing:.005em;max-width:900px;text-wrap:balance}
  .quote em{color:#ff1a8c;font-style:normal}
  .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-size:16px;color:#888;text-transform:uppercase}
  .foot .url{font-family:'Rajdhani',sans-serif;font-weight:500;letter-spacing:.18em;color:#ccc}
  .foot .tag{font-family:'Share Tech Mono',monospace;letter-spacing:-.01em}
  .cursor{color:#ff1a8c;animation:blink 1s step-end infinite}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</head><body>
<div class="frame" id="frame">
  <div class="ghost">UW<span>_</span></div>
  <div class="content">
    <div class="eyebrow">// pull-quote</div>
    <div class="rule"></div>
    <div class="quote">"The hard part is no longer getting access to intelligence.<br>The hard part is <em>giving intelligence a deep understanding</em> of how your business actually works."</div>
    <div class="foot">
      <span class="url">ultrawinning.com<span class="cursor">_</span></span>
      <span class="tag">// the moat is not the model</span>
    </div>
  </div>
</div>
<script>
  const fit=()=>{const f=document.getElementById('frame');const s=Math.min((window.innerWidth-80)/1200,(window.innerHeight-80)/675,1);f.style.transform=`scale(${s})`};
  window.addEventListener('resize',fit);fit();
</script>
</body></html>
