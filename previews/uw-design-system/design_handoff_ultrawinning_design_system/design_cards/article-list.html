<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 28px; }
  .wpost { display:block; padding:4px 0; }
  .wpost::before { content:'•'; color:#888; margin-right:10px; font-size:11px; }
  .wpost a { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:500; letter-spacing:.02em; color:#f0ede8; text-decoration:none; transition:color .15s; }
  .wpost a:hover { color:#ff1a8c; }
  .wpost a.local::before { content:'// '; color:#ff1a8c; font-family:'Share Tech Mono',monospace; font-size:11px; }
  .tabs { display:flex; gap:20px; margin-bottom:14px; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.12em; color:#888; }
  .tabs .on { color:#ff1a8c; }
</style>
</head><body>
<div class="card">
  <div class="tabs"><span class="on">// essays</span><span>// technical</span></div>
  <div class="wpost"><a href="#" class="local">The Moat Is Not the Model</a></div>
  <div class="wpost"><a href="#">95% of my happiness is these 5 things, so why am I still hustling?</a></div>
  <div class="wpost"><a href="#">Beware of free stuff — it costs you a lot more than you think</a></div>
  <div class="wpost"><a href="#">Medium is a Ponzi scheme — I just need to decide if I'm okay with it</a></div>
</div>
</body></html>
