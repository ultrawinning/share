<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; display:flex; flex-wrap:wrap; gap:16px 28px; align-items:center; }
  .g { display:flex; align-items:center; gap:10px; font-family:'Share Tech Mono',monospace; font-size:11px; color:#888; letter-spacing:.08em; }
  .ic { color:#ff1a8c; font-size:16px; width:22px; text-align:center; display:inline-block; font-family:'Share Tech Mono',monospace; line-height:1; }
  .ic.uni { color:#f0ede8; }
  .lbl { color:#888; }
  h4 { width:100%; margin:0 0 4px 0; font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.2em; text-transform:uppercase; font-weight:400; }
</style>
</head><body>
<div class="card">
  <h4>// ascii markers</h4>
  <div class="g"><span class="ic">&gt;</span><span class="lbl">prompt</span></div>
  <div class="g"><span class="ic">//</span><span class="lbl">comment</span></div>
  <div class="g"><span class="ic">_</span><span class="lbl">cursor (blinks)</span></div>
  <div class="g"><span class="ic uni">→</span><span class="lbl">forward link</span></div>
  <div class="g"><span class="ic uni">←</span><span class="lbl">back link</span></div>
  <div class="g"><span class="ic uni">↑</span><span class="lbl">to top</span></div>
  <div class="g"><span class="ic uni">•</span><span class="lbl">list bullet</span></div>
  <h4>// mode toggle</h4>
  <div class="g"><span class="ic uni">☀</span><span class="lbl">dark → light</span></div>
  <div class="g"><span class="ic uni">☾</span><span class="lbl">light → dark</span></div>
  <div class="g"><span class="ic">&gt;&gt;</span><span class="lbl">streak · active</span></div>
  <div class="g"><span class="ic uni" style="color:#666">--</span><span class="lbl">idle · dormant</span></div>
</div>
</body></html>
