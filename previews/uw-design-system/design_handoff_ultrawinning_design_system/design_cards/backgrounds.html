<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 18px 28px; }
  .row { display:flex; gap:18px; align-items:flex-start; }
  .tile { flex:1; height:110px; position:relative; overflow:hidden; background:#000; border:1px solid #1a1a1a; }
  .scan::before { content:''; position:absolute; inset:0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,.018) 3px, rgba(255,255,255,.018) 4px); pointer-events:none; }
  .scan::after { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 50% 95%, rgba(255,26,140,.12) 0%, transparent 60%); pointer-events:none; }
  .ghost { font-family:'Share Tech Mono',monospace; font-size:56px; color:rgba(255,255,255,.05); letter-spacing:-.02em; position:absolute; top:-4px; left:6px; line-height:1; }
  .ghost span { color:rgba(255,10,138,.14); }
  .caption { margin-top:10px; font-family:'Share Tech Mono',monospace; font-size:10px; color:#888; letter-spacing:.08em; }
  .tile .inner { position:absolute; bottom:10px; left:12px; font-family:'Share Tech Mono',monospace; font-size:10px; color:#888; letter-spacing:.1em; }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="tile scan"><div class="inner">scanlines + radial pink glow</div></div>
    <div class="tile"><div class="ghost">ULTRA<span>_</span></div><div class="inner" style="color:#888">ghost wordmark · 5% opacity</div></div>
  </div>
  <div class="caption">// dark mode only — skip on light backgrounds</div>
</div>
</body></html>
