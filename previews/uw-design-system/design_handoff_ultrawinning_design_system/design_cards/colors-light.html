<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  body { background: #fff; color: #000; }
  .card { padding: 0; }
  .row { display: flex; height: 110px; }
  .sw { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 14px 16px; border-right: 1px solid rgba(0,0,0,.06); }
  .sw:last-child { border-right: none; }
  .name { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
  .hex { font-family: 'Share Tech Mono', monospace; font-size: 10px; opacity: .5; margin-top: 2px; }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="sw" style="background:#fff;color:#000;border:1px solid #eee"><div class="name">bg</div><div class="hex">#fff</div></div>
    <div class="sw" style="background:#000;color:#fff"><div class="name">fg</div><div class="hex">#000</div></div>
    <div class="sw" style="background:#666;color:#fff"><div class="name">muted</div><div class="hex">#666</div></div>
    <div class="sw" style="background:#ddd;color:#000"><div class="name">border</div><div class="hex">#ddd</div></div>
    <div class="sw" style="background:#ccc;color:#000"><div class="name">footer</div><div class="hex">#ccc</div></div>
  </div>
</div>
</body></html>
