<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 28px; }
  .bq { border-left:2px solid #ff1a8c; background:rgba(255,26,140,.05); padding:12px 18px; font-family:'Rajdhani',sans-serif; font-weight:500; font-size:15px; color:#f0ede8; letter-spacing:.04em; line-height:1.5; }
  .bq cite { display:block; margin-top:8px; font-family:'Rajdhani',sans-serif; font-size:10px; color:#888; letter-spacing:.14em; text-transform:uppercase; font-style:normal; font-weight:600; }
  .pq { margin-top:14px; font-family:Verdana,Arial,sans-serif; font-style:italic; color:#f0ede8; font-size:13px; border-left:2px solid #ff1a8c; background:rgba(255,26,140,.05); padding:8px 16px; max-width:435px; }
</style>
</head><body>
<div class="card">
  <div class="bq">
    "The standard you walk past is the standard you accept."
    <cite>— David Morrison</cite>
  </div>
  <div class="pq">
    This is the moat. This will decide if you win or lose.
  </div>
</div>
</body></html>
