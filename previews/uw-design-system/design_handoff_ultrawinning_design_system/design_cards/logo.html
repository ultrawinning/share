<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; display:flex; align-items:center; gap:28px; }
  .mark { width:110px; flex-shrink:0; }
  .wm { font-family:'Rajdhani',sans-serif; font-weight:500; font-size:24px; color:#f0ede8; letter-spacing:.18em; text-transform:uppercase; line-height:1; }
  .wm .c { color:#ff1a8c; }
  .specs { font-family:'Share Tech Mono',monospace; font-size:10px; color:#888; letter-spacing:.08em; margin-top:14px; line-height:1.9; }
</style>
</head><body>
<div class="card">
  <img class="mark" src="../assets/logo-mark.svg" alt="ultrawinning mark" style="image-rendering:pixelated">
  <div>
    <div class="wm">ULTRAWINNING<span class="cursor c">_</span></div>
    <div class="specs">
      // mark: pixel space-invader · pink #ff1a8c<br>
      // wordmark: share tech mono · blinking pink underscore<br>
      // always followed by "_" cursor — never without it
    </div>
  </div>
</div>
</body></html>
