<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 28px; font-family:'Share Tech Mono',monospace; font-size:13px; color:#ccc; line-height:1.7; }
  .sys span { display:block; color:#888; font-size:12px; }
  .sys .v { color:#666; display:inline; }
  .pl { display:flex; align-items:center; padding:4px 0; }
  .pn { color:#ff1a8c; margin-right:14px; font-size:11px; min-width:22px; }
  .pname { font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#f0ede8; margin-right:10px; font-size:13px; }
  .pdesc { color:#888; font-size:11px; flex:1; }
</style>
</head><body>
<div class="card">
  <div class="sys">
    <span>System: <span class="v">ULTRAWINNING v1.0.0</span></span>
    <span>Status: <span class="v">OPERATIONAL</span></span>
  </div>
  <div style="margin-top:10px"><span style="color:#ff1a8c">&gt;</span> <span style="color:#ff1a8c" class="cursor">_</span></div>
  <div class="pl"><span class="pn">01</span><span class="pname">HPFHQ</span><span class="pdesc">// Elite growth operator dashboard</span><span style="color:#888">→</span></div>
  <div class="pl"><span class="pn">02</span><span class="pname">MEDUS</span><span class="pdesc">// Hive intelligence feeding the agent swarm</span><span style="color:#888">→</span></div>
</div>
</body></html>
