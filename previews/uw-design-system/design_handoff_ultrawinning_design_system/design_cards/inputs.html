<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 28px; display:flex; flex-direction:column; gap:14px; }
  .field { display:flex; }
  .input { flex:1; background:transparent; border:1px solid #222; padding:11px 14px; color:#f0ede8; font-family:'Share Tech Mono',monospace; font-size:12px; outline:none; letter-spacing:.08em; }
  .input:focus { border-color:#ff1a8c; }
  .input::placeholder { color:#888; }
  .submit { background:#ff1a8c; color:#000; border:1px solid #ff1a8c; padding:0 20px; font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:.1em; text-transform:uppercase; font-size:12px; cursor:pointer; }
  .search { background:transparent; border:none; border-bottom:1px solid #222; padding:8px 0; color:#f0ede8; font-family:'Share Tech Mono',monospace; font-size:12px; outline:none; letter-spacing:.08em; width:100%; }
  .search::placeholder { color:#888; }
  .search:focus { border-bottom-color:#ff1a8c; }
  .lbl { font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.18em; text-transform:uppercase; }
</style>
</head><body>
<div class="card">
  <div class="lbl">// password · bordered + submit</div>
  <div class="field">
    <input class="input" placeholder="// password" style="border-right:none">
    <button class="submit">RUN</button>
  </div>
  <div class="lbl">// search · underline only</div>
  <input class="search" placeholder="// search articles...">
</div>
</body></html>
