<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>IG Story — Ultrawinning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#111;height:100%;width:100%;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  .stage{width:1080px;height:1920px;transform-origin:center center}
  .frame{
    width:1080px;height:1920px;
    background:#000;color:#ccc;
    position:relative;overflow:hidden;
    font-family:'Rajdhani',sans-serif;
  }
  /* subtle scanlines */
  .frame::before{
    content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 6px,rgba(255,255,255,.012) 6px,rgba(255,255,255,.012) 7px);
  }
  /* unified pink bloom — same recipe across all social templates */
  .frame::after{
    content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 75% 60% at 15% 100%,rgba(255,26,140,.45) 0%,rgba(255,26,140,.12) 30%,transparent 65%),
      radial-gradient(ellipse 100% 55% at 50% 110%,rgba(255,26,140,.22) 0%,transparent 70%);
  }

  /* Ghost wordmark — spans the full frame width, top-aligned */
  .ghost{
    position:absolute;top:70px;left:0;right:0;z-index:0;
    font-family:'Rajdhani',sans-serif;font-weight:500;
    font-size:140px;line-height:.9;
    color:rgba(255,255,255,.06);
    letter-spacing:.18em;text-transform:uppercase;
    text-align:center;pointer-events:none;user-select:none;
    white-space:nowrap;
  }
  .ghost .cur{color:rgba(255,26,140,.18)}

  /* Meta eyebrow — tiny, top of content, terminal */
  .eyebrow{
    position:absolute;top:260px;left:90px;
    font-family:'Share Tech Mono',monospace;
    font-size:24px;color:#ff1a8c;
    letter-spacing:.22em;text-transform:uppercase;
    z-index:1;
  }

  /* Content block — vertically centered around 60% */
  .content{
    position:absolute;left:90px;right:90px;top:50%;
    transform:translateY(-50%);
    z-index:1;
  }
  .rule{width:120px;height:2px;background:#ff1a8c;margin-bottom:56px}
  .quote{
    font-family:'Rajdhani',sans-serif;
    font-weight:600;font-size:128px;line-height:1.02;
    color:#f0ede8;letter-spacing:-.015em;
    text-wrap:balance;margin:0;
  }
  .quote em{font-style:normal;color:#ff1a8c}

  /* Attribution — bottom. URL = brand (Rajdhani); tag = terminal meta (mono) */
  .attribution{
    position:absolute;bottom:90px;left:90px;right:90px;
    display:flex;justify-content:space-between;align-items:baseline;
    z-index:1;
    font-size:26px;color:#888;text-transform:uppercase;
  }
  .attribution .url{font-family:'Rajdhani',sans-serif;font-weight:500;letter-spacing:.15em;color:#f0ede8}
  .attribution .cur{color:#ff1a8c;animation:blink 1s step-end infinite;display:inline-block;margin-left:2px}
  .attribution .tag{font-family:'Share Tech Mono',monospace;letter-spacing:-.01em;color:#666}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</head><body>
<div class="stage" id="stage">
  <div class="frame">
    <div class="ghost">ULTRAWINNING<span class="cur">_</span></div>
    <div class="eyebrow">// new essay</div>
    <div class="content">
      <div class="rule"></div>
      <h1 class="quote">The moat is <em>not</em> the model.</h1>
    </div>
    <div class="attribution">
      <span class="url">ultrawinning.com<span class="cur">_</span></span>
      <span class="tag">// 04 · 2026</span>
    </div>
  </div>
</div>
<script>
  // Uniform scale to fit viewport — transform-origin center so it stays centered.
  const fit = () => {
    const stage = document.getElementById('stage');
    const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
    stage.style.transform = `scale(${s})`;
  };
  window.addEventListener('resize', fit); fit();
</script>
</body></html>
