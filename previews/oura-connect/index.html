<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connected — Dr Emil Coaching</title>
<style>
  :root { color-scheme: light; }
  html, body { height: 100%; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #faf8f4; color: #1a1a1a; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 420px; width: 100%; text-align: center;
          box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 12px 32px rgba(0,0,0,.06); }
  .badge { width: 72px; height: 72px; border-radius: 50%; background: #e7f6ec; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  h1 { font-size: 1.5rem; margin: 0 0 8px; }
  p { color: #555; line-height: 1.55; margin: 0 0 8px; }
  .pills { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 22px 0 8px; }
  .pill { font-size: .8rem; color: #2d6a4f; background: #e7f6ec; border-radius: 999px; padding: 5px 12px; }
  .close { color: #888; font-size: .85rem; margin-top: 20px; }
  .brand { margin-top: 28px; font-size: .8rem; letter-spacing: .04em; color: #b9b3a8; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2d9e5b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>You're connected</h1>
    <p>Your Oura is now linked to <strong>Dr Emil Coaching</strong>, so Emil can see your sleep, recovery and training — and make your coaching sharper.</p>
    <div class="pills">
      <span class="pill">Read-only</span>
      <span class="pill">Revoke anytime in Oura</span>
    </div>
    <p class="close">You can close this tab.</p>
    <div class="brand">Dr Emil Coaching</div>
  </div>
</body>
</html>
