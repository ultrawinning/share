<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>/goal — the part nobody posts · ultrawinning</title>
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000;--pink:#ff1a8c;--w:#f0ede8;--mu:#888;--dimb:#1a1a1a}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#000;color:var(--w);-webkit-font-smoothing:antialiased}
  body{font-family:'Share Tech Mono',monospace;min-height:100vh;padding:24px 16px 80px}
  .wrap{max-width:520px;margin:0 auto}
  header{padding:12px 4px 28px}
  .eyebrow{font-size:.72rem;color:var(--pink);letter-spacing:.30em;text-transform:uppercase;margin-bottom:14px}
  h1{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:2rem;line-height:1.05;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}
  h1 .accent{color:var(--pink)}
  p.lede{font-family:Verdana,Geneva,sans-serif;font-size:.95rem;line-height:1.55;color:#dcd9d4}
  .actions{display:flex;gap:10px;margin:20px 0 8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 16px;border:1px solid var(--pink);color:var(--pink);text-decoration:none;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;background:rgba(255,26,140,0.06)}
  .btn:active{background:rgba(255,26,140,0.18)}
  .hint{font-size:.7rem;color:var(--mu);letter-spacing:.14em;text-transform:uppercase;margin-top:8px;padding-left:4px}
  .grid{display:flex;flex-direction:column;gap:28px;margin-top:32px}
  figure{margin:0}
  .label{font-size:.7rem;color:var(--mu);letter-spacing:.20em;text-transform:uppercase;margin-bottom:10px;padding-left:4px;display:flex;justify-content:space-between}
  .label .num{color:var(--pink)}
  img{display:block;width:100%;height:auto;border:1px solid var(--dimb);background:#000}
  footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--dimb);font-size:.7rem;color:var(--mu);letter-spacing:.16em;text-transform:uppercase;text-align:center}
  footer a{color:inherit;text-decoration:none}
  footer a:hover,footer a:active{color:var(--pink)}
  @media(min-width:680px){
    body{padding:48px 24px 96px}
    h1{font-size:2.8rem}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">// ultrawinning / goal</div>
    <h1><span class="accent">/GOAL</span> — the part nobody posts</h1>
    <p class="lede">6-slide story for IG. Long-press each image → <strong>Save to Photos</strong>. Or grab them all in one zip.</p>
    <div class="actions">
      <a class="btn" href="goal-story-slides.zip" download>↓ Download all (zip)</a>
    </div>
    <div class="hint">// tip: on iOS long-press an image → save to photos</div>
  </header>

  <div class="grid">
    <figure>
      <div class="label"><span>// 01 hook</span><span class="num">/GOAL is a loaded gun</span></div>
      <img src="png/slide-1-hook.png" alt="Slide 1 — /GOAL is a loaded gun" loading="lazy">
    </figure>
    <figure>
      <div class="label"><span>// 02 downside</span><span class="num">monkey's paw</span></div>
      <img src="png/slide-2-spec-gaming.png" alt="Slide 2 — Monkey's paw" loading="lazy">
    </figure>
    <figure>
      <div class="label"><span>// 03 downside</span><span class="num">no steering wheel</span></div>
      <img src="png/slide-3-no-steering.png" alt="Slide 3 — No steering wheel" loading="lazy">
    </figure>
    <figure>
      <div class="label"><span>// 04 downside</span><span class="num">bulldozed</span></div>
      <img src="png/slide-4-constraints.png" alt="Slide 4 — Everything unsaid gets bulldozed" loading="lazy">
    </figure>
    <figure>
      <div class="label"><span>// 05 downside</span><span class="num">taste leaves</span></div>
      <img src="png/slide-5-taste.png" alt="Slide 5 — Your taste leaves the building" loading="lazy">
    </figure>
    <figure>
      <div class="label"><span>// 06 verdict</span><span class="num">explore not execute</span></div>
      <img src="png/slide-6-verdict.png" alt="Slide 6 — Explore with /goal. Execute without it." loading="lazy">
    </figure>
  </div>

  <footer>
    <a href="https://ultrawinning.com">ultrawinning.com</a>
  </footer>

</div>
</body>
</html>
